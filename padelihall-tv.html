<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volta Padel – TV</title>
<style>
@font-face {
  font-family: 'Stratos';
  src: url('https://voltapadel.ee/wp-content/uploads/2025/05/stratos-regular-1.woff2') format('woff2');
  font-weight: 400;
}
@font-face {
  font-family: 'Stratos';
  src: url('https://voltapadel.ee/wp-content/uploads/2025/05/stratos-semibold-1.woff2') format('woff2');
  font-weight: 600;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --orange:   #E75100;
  --brown:    #33272a;
  --cream:    #faeee7;
  --peach:    #fee0c2;
  --muted:    #594a4e;
  --bg:       #1e1514;
  --card-bg:  #2a1f20;
  --card-border: rgba(89,74,78,0.35);
}

body {
  font-family: 'Stratos', 'Segoe UI', Arial, sans-serif;
  background: var(--bg);
  color: var(--cream);
  min-height: 100vh;
  overflow: hidden;
}

/* ── TV ekraan ─────────────────────────────────────────── */
#tv-screen {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  padding: 32px 36px 22px;
}

/* Päis */
.header {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  margin-bottom: 30px;
  padding-bottom: 22px;
  border-bottom: 1px solid var(--card-border);
}

.header-left {
  display: flex;
  align-items: flex-end;
}

.header-website {
  font-size: 13px;
  color: var(--muted);
  letter-spacing: 1px;
}

.header-logo {
  display: flex;
  justify-content: center;
}

.header-logo img { height: 56px; }

.clock-block { text-align: right; }

.clock {
  font-size: 56px;
  font-weight: 600;
  color: var(--cream);
  letter-spacing: 2px;
  line-height: 1;
}

.date-str {
  font-size: 15px;
  color: var(--muted);
  margin-top: 5px;
  letter-spacing: 0.5px;
}

/* Väljakute grid */
.courts-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 18px;
  flex: 1;
}

.court-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-top: 3px solid var(--card-border);
  border-radius: 4px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  transition: border-top-color 0.3s;
}

.court-card.active {
  border-top-color: var(--orange);
}

.court-name {
  font-size: 18px;
  font-weight: 600;
  color: var(--cream);
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* Broneeringu blokk */
.booking-block {
  background: var(--bg);
  border-radius: 3px;
  padding: 14px 16px;
  border-left: 3px solid var(--card-border);
  min-height: 86px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.booking-block.now  { border-left-color: var(--orange); }
.booking-block.next { border-left-color: var(--muted); }
.booking-block.empty { opacity: 0.45; }

.block-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.now  .block-label { color: var(--orange); }
.next .block-label { color: var(--muted); }
.empty .block-label { color: var(--muted); }

.booking-time {
  font-size: 24px;
  font-weight: 600;
  color: var(--cream);
  letter-spacing: 0.5px;
  line-height: 1;
  margin-bottom: 5px;
}

.empty .booking-time {
  font-size: 15px;
  color: var(--muted);
  font-weight: 400;
}

.booking-name {
  font-size: 13px;
  color: rgba(250,238,231,0.6);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.progress-wrap {
  height: 3px;
  background: rgba(89,74,78,0.4);
  border-radius: 2px;
  overflow: hidden;
  margin-top: 10px;
}

.progress-bar {
  height: 100%;
  background: var(--orange);
  border-radius: 2px;
  transition: width 30s linear;
}

.time-left {
  font-size: 11px;
  color: rgba(231,81,0,0.7);
  margin-top: 5px;
  letter-spacing: 0.3px;
}

.next .time-left { color: var(--muted); }

/* Jalus */
.footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 22px;
  padding-top: 16px;
  border-top: 1px solid var(--card-border);
}

.status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--orange);
  display: inline-block;
  margin-right: 8px;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.3; }
}

.footer-status {
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.5px;
}

.refresh-bar-wrap {
  width: 180px;
  height: 2px;
  background: rgba(89,74,78,0.4);
  border-radius: 2px;
  overflow: hidden;
}

.refresh-bar {
  height: 100%;
  background: var(--orange);
  border-radius: 2px;
  width: 100%;
  transition: width linear;
}

.footer-right {
  font-size: 12px;
  color: var(--muted);
  cursor: pointer;
  letter-spacing: 1px;
  text-transform: uppercase;
  transition: color 0.2s;
}

.footer-right:hover { color: var(--cream); }

/* Loading */
#loading {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(30,21,20,0.9);
  align-items: center;
  justify-content: center;
  z-index: 100;
  flex-direction: column;
  gap: 16px;
}

.spinner {
  width: 36px; height: 36px;
  border: 2px solid var(--card-border);
  border-top-color: var(--orange);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

.loading-text {
  font-size: 13px;
  color: var(--muted);
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Laadin...</div>
</div>

<!-- TV ekraan -->
<div id="tv-screen">
  <div class="header">
    <div class="header-left">
      <span class="header-website">www.voltapadel.ee</span>
    </div>
    <div class="header-logo">
      <img src="https://voltapadel.ee/wp-content/uploads/2025/05/volta-padel-white.svg" alt="Volta Padel">
    </div>
    <div class="clock-block">
      <div class="clock" id="clock">00:00</div>
      <div class="date-str" id="date-str"></div>
    </div>
  </div>

  <div class="courts-grid" id="courts-grid"></div>

  <div class="footer">
    <div class="footer-status">
      <span class="status-dot"></span>
      <span id="last-update">Uueneb kohe...</span>
    </div>
    <div class="refresh-bar-wrap">
      <div class="refresh-bar" id="refresh-bar"></div>
    </div>
    <div class="footer-right" onclick="location.reload()">Logi välja</div>
  </div>
</div>

<script>
const PROXY = '';  // suhtelised URL-id – töötab nii lokaalsel kui serveris
const REFRESH_MS = 2 * 60 * 1000;

let courts = [];
let refreshTimer = null;
let refreshBarTimer = null;

const KUUD = ['jaanuar','veebruar','märts','aprill','mai','juuni',
              'juuli','august','september','oktoober','november','detsember'];
const NADALAP = ['pühapäev','esmaspäev','teisipäev','kolmapäev','neljapäev','reede','laupäev'];

function pad(n) { return String(n).padStart(2,'0'); }
function formatTime(d) { return `${pad(d.getHours())}:${pad(d.getMinutes())}`; }
function formatDate(d) { return `${NADALAP[d.getDay()]}, ${d.getDate()}. ${KUUD[d.getMonth()]} ${d.getFullYear()}`; }

function formatDuration(min) {
  const h = Math.floor(min / 60), m = min % 60;
  if (h && m) return `${h} t ${m} min`;
  if (h) return `${h} t`;
  return `${m} min`;
}

function tickClock() {
  const now = new Date();
  document.getElementById('clock').textContent = formatTime(now);
  document.getElementById('date-str').textContent = formatDate(now);
}

function showLoading(v) {
  document.getElementById('loading').style.display = v ? 'flex' : 'none';
}

// ── Andmete laadimine ──────────────────────────────────────────────────
async function loadData() {
  try {
    const [resResp, bookResp] = await Promise.all([
      fetch(`${PROXY}/resources`),
      fetch(`${PROXY}/bookings`)
    ]);

    if (!resResp.ok || !bookResp.ok) {
      console.error('API viga:', resResp.status, bookResp.status);
      return false;
    }

    const resources = await resResp.json();
    const bookings  = await bookResp.json();

    const allRes = Array.isArray(resources) ? resources : (resources.content || []);
    courts = allRes
      .filter(r => r.is_active !== false)
      .map(r => ({ id: r.resource_id || r.id, name: r.name || r.resource_name }));

    if (!courts.length) {
      courts = [1,2,3,4].map(i => ({ id: String(i), name: `Väljak ${i}` }));
    }

    renderCourts(Array.isArray(bookings) ? bookings : (bookings.content || []));
    document.getElementById('last-update').textContent = `Uuendatud: ${formatTime(new Date())}`;
    return true;

  } catch (e) {
    console.error('Ühenduse viga:', e.message);
    return false;
  }
}

// ── Renderdamine ───────────────────────────────────────────────────────
function renderCourts(bookings) {
  const now  = new Date();
  const grid = document.getElementById('courts-grid');
  grid.innerHTML = '';

  courts.forEach(court => {
    const cb = bookings
      .filter(b => !b.is_canceled && b.status !== 'CANCELED' && String(b.resource_id) === String(court.id))
      .map(b => ({
        start: new Date(b.booking_start_date + 'Z'),
        end:   new Date(b.booking_end_date   + 'Z'),
        name:  (b.participant_info?.participants?.[0]?.name) || ''
      }))
      .filter(b => !isNaN(b.start))
      .sort((a, b) => a.start - b.start);

    const active   = cb.find(b => b.start <= now && b.end > now);
    const upcoming = cb.find(b => b.start > now);

    const card = document.createElement('div');
    card.className = 'court-card' + (active ? ' active' : '');
    card.innerHTML = `<div class="court-name">${esc(court.name)}</div>`;
    card.appendChild(bookingBlock(active,   'now',  now));
    card.appendChild(bookingBlock(upcoming, 'next', now));
    grid.appendChild(card);
  });

  // Täida 4ni kui väljakuid vähem
  while (grid.children.length < 4) {
    const i = grid.children.length + 1;
    const card = document.createElement('div');
    card.className = 'court-card';
    card.innerHTML = `<div class="court-name">Väljak ${i}</div>`;
    card.appendChild(bookingBlock(null, 'now',  new Date()));
    card.appendChild(bookingBlock(null, 'next', new Date()));
    grid.appendChild(card);
  }
}

function bookingBlock(b, type, now) {
  const div = document.createElement('div');

  if (!b) {
    div.className = 'booking-block empty';
    div.innerHTML = `
      <div class="block-label">${type === 'now' ? 'Praegu' : 'Järgmine'}</div>
      <div class="booking-time">Vaba</div>`;
    return div;
  }

  div.className = `booking-block ${type}`;
  const label   = type === 'now' ? 'Praegu' : 'Järgmine';
  const timeStr = `${formatTime(b.start)} – ${formatTime(b.end)}`;
  const nameHtml = b.name ? `<div class="booking-name">${esc(formatName(b.name))}</div>` : '';

  let extra = '';
  if (type === 'now') {
    const total = Math.round((b.end - b.start) / 60000);
    const done  = Math.round((now  - b.start) / 60000);
    const pct   = Math.min(100, Math.round(done / total * 100));
    const left  = Math.max(0, total - done);
    extra = `<div class="progress-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
             <div class="time-left">${formatDuration(left)} jäänud</div>`;
  } else {
    const diff = Math.round((b.start - now) / 60000);
    extra = `<div class="time-left next">${diff < 60 ? `${diff} min pärast` : formatDuration(diff) + ' pärast'}</div>`;
  }

  div.innerHTML = `
    <div class="block-label">${label}</div>
    <div class="booking-time">${timeStr}</div>
    ${nameHtml}
    ${extra}`;
  return div;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatName(full) {
  if (!full) return '';
  const parts = full.trim().split(/\s+/);
  if (parts.length === 1) return parts[0];
  const first = parts.slice(0, parts.length - 1).join(' ');
  const lastInitial = parts[parts.length - 1][0].toUpperCase();
  return `${first} ${lastInitial}.`;
}

// ── Automaatne uuenemine ───────────────────────────────────────────────
function startRefreshCycle() {
  clearInterval(refreshTimer);
  refreshTimer = setInterval(() => { loadData(); startProgressBar(); }, REFRESH_MS);
  startProgressBar();
}

function startProgressBar() {
  const bar = document.getElementById('refresh-bar');
  const start = Date.now();
  bar.style.transition = 'none';
  bar.style.width = '100%';
  clearInterval(refreshBarTimer);
  refreshBarTimer = setInterval(() => {
    const pct = Math.max(0, 100 - (Date.now() - start) / REFRESH_MS * 100);
    bar.style.transition = 'width 1s linear';
    bar.style.width = pct + '%';
    if (pct <= 0) clearInterval(refreshBarTimer);
  }, 1000);
}

// ── Käivitus ───────────────────────────────────────────────────────────
tickClock();
setInterval(tickClock, 1000);
document.addEventListener('keydown', e => { if (e.key === 'F5') { e.preventDefault(); loadData(); } });

showLoading(true);
loadData().then(() => {
  showLoading(false);
  startRefreshCycle();
});
</script>
</body>
</html>
